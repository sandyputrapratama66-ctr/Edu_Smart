function mdlBuatTagihanSpp() {
  if (!DB.siswa.length) { toast('Belum ada data siswa. Tambah data siswa terlebih dahulu', 'wn'); return; }
  openMdl('Buat Tagihan SPP', `
  <div class="fg"><label>Target Tagihan *</label>
    <select id="spp-target" onchange="onSppTargetChange()">
      <option value="satu">Siswa Tertentu</option>
      <option value="kelas">Satu Kelas (semua siswa)</option>
      <option value="semua">Semua Siswa</option>
    </select>
  </div>
  <div class="fg" id="spp-siswa-wrap"><label>Pilih Siswa *</label>
    <select id="spp-siswa">
      ${DB.siswa.map(s=>`<option value="${s.id}">${esc(s.nama)} — ${esc(s.kelas||'-')}</option>`).join('')}
    </select>
  </div>
  <div class="fg" id="spp-kelas-wrap" style="display:none"><label>Pilih Kelas *</label>
    <select id="spp-kelas">
      ${DB.kelas.map(k=>`<option>${esc(k.nama)}</option>`).join('')}
    </select>
  </div>
  <div class="frow">
    <div class="fg"><label>Judul Tagihan *</label><input id="spp-judul" placeholder="mis. SPP Bulan Juli 2026"></div>
    <div class="fg"><label>Jumlah (Rp) *</label><input id="spp-jumlah" type="number" min="0" placeholder="0"></div>
  </div>
  <div class="fg"><label>Jatuh Tempo</label><input id="spp-tempo" type="date"></div>
  <div class="fg"><label>Catatan</label><textarea id="spp-catatan" placeholder="Catatan tambahan (opsional)..."></textarea></div>`,
  `<button class="bo" onclick="closeMdl()">Batal</button>
   <button class="bp" onclick="buatTagihanSpp()"><i class="ti ti-send"></i> Buat & Kirim Notifikasi</button>`);
}
function onSppTargetChange() {
  const t = document.getElementById('spp-target').value;
  document.getElementById('spp-siswa-wrap').style.display = t==='satu' ? '' : 'none';
  document.getElementById('spp-kelas-wrap').style.display = t==='kelas' ? '' : 'none';
}
function buatTagihanSpp() {
  const target = document.getElementById('spp-target').value;
  const judul = (document.getElementById('spp-judul').value||'').trim();
  const jumlah = document.getElementById('spp-jumlah').value;
  const tempo = document.getElementById('spp-tempo').value;
  const catatan = document.getElementById('spp-catatan').value;
  if (!judul || !jumlah) { toast('Judul dan jumlah tagihan wajib diisi', 'er'); return; }

  let targetSiswa = [];
  if (target === 'satu') {
    const s = DB.siswa.find(x=>x.id===document.getElementById('spp-siswa').value);
    if (!s) { toast('Pilih siswa terlebih dahulu', 'er'); return; }
    targetSiswa = [s];
  } else if (target === 'kelas') {
    const kl = document.getElementById('spp-kelas').value;
    if (!kl) { toast('Pilih kelas terlebih dahulu', 'er'); return; }
    targetSiswa = DB.siswa.filter(s=>s.kelas===kl);
  } else {
    targetSiswa = DB.siswa;
  }
  if (!targetSiswa.length) { toast('Tidak ada siswa pada target yang dipilih', 'er'); return; }

  let terkirim = 0;
  targetSiswa.forEach(s => {
    const tagihanId = uid();
    DB.tagihanSpp.push({
      id: tagihanId, siswaId: s.id, judul, jumlah: +jumlah,
      jatuhTempo: tempo, catatan, status: 'belum', dibuatOleh: S.uid, tgl: now()
    });
    // Kirim notifikasi otomatis ke akun siswa yang dituju (jika siswa punya akun login)
    if (s.userId) {
      DB.notifPribadi.push({
        id: uid(), userId: s.userId, jenis: 'spp', refId: tagihanId,
        judul: 'Tagihan SPP Baru',
        isi: `${judul} sebesar ${rp(jumlah)}${tempo?(' — jatuh tempo '+tempo):''}`,
        tgl: now(), dibaca: false
      });
      terkirim++;
    }
  });
  saveDB(); closeMdl();
  toast(`${targetSiswa.length} tagihan SPP dibuat, ${terkirim} notifikasi terkirim ke akun siswa`);
  pgKeuangan();
}
function tandaiLunasSpp(id) {
  const t = DB.tagihanSpp.find(x=>x.id===id); if (!t) return;
  const s = DB.siswa.find(x=>x.id===t.siswaId)||{};
  confirmAction(`Tandai tagihan "${t.judul}" milik ${s.nama||'siswa'} sebagai Lunas? Transaksi pemasukan SPP akan otomatis dicatat di Keuangan.`, () => {
    t.status = 'lunas'; t.tglBayar = now();
    DB.keuangan.push({ id: uid(), tipe: 'pemasukan', kategori: 'SPP', ket: `Pembayaran SPP — ${s.nama||'-'} — ${t.judul}`, jumlah: t.jumlah, tgl: now() });
    if (s.userId) {
      DB.notifPribadi.push({ id: uid(), userId: s.userId, jenis: 'spp', refId: t.id, judul: 'Pembayaran SPP Dikonfirmasi', isi: `Pembayaran ${t.judul} sebesar ${rp(t.jumlah)} telah dikonfirmasi lunas.`, tgl: now(), dibaca: false });
    }
    saveDB(); toast('Tagihan ditandai lunas'); pgKeuangan();
  }, 'Ya, Tandai Lunas');
}
function hapusTagihanSpp(id) {
  confirmAction('Hapus tagihan SPP ini?', () => {
    DB.tagihanSpp = DB.tagihanSpp.filter(t=>t.id!==id); saveDB(); toast('Tagihan SPP dihapus'); pgKeuangan();
  });
}

function renderSuratTbl(arr, tipe) {

    <tbody>${[...arr].reverse().map(s=>`<tr>
      <td><b>${esc(s.no)}</b></td>
      <td>${esc(tipe==='masuk'?s.dari||'—':s.kepada||'—')}</td>
      <td>${esc(s.perihal)}</td>
      <td style="font-size:12px">${s.tgl}</td>
      <td><span class="bdg ${tipe==='masuk'?'dok':'dbl'}">${esc(s.status)}</span></td>
      <td><div style="display:flex;gap:4px">

        <button class="br bsm" onclick="hapusSurat('${s.id}')"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`).join('')}

  </div>

  <div class="fg"><label>Perihal *</label><input id="sph" placeholder="Perihal surat..."></div>
  <div class="fg"><label>Isi / Ringkasan</label><textarea id="sisi" placeholder="Isi atau ringkasan surat..."></textarea></div>`,
  `<button class="bo" onclick="closeMdl()">Batal</button>

  const no=(document.getElementById('sno').value||'').trim();

function hapusSurat(id) {
  confirmAction('Hapus surat ini?', () => {

function saveProfil() {
  const u = DB.users.find(x=>x.id===S.uid); if (!u) return;
  u.nama = document.getElementById('pr-nm').value;
  u.email = document.getElementById('pr-em').value;
  saveDB(); toast('Profil diperbarui');
  buildApp();
}
function ubahPw() {
  const u = DB.users.find(x=>x.id===S.uid); if (!u) return;
  const o=document.getElementById('po').value;
  const n=document.getElementById('pn').value;
  const c=document.getElementById('pc').value;
  if (u.password!==o) { toast('Password lama salah','er'); return; }
  if (!n) { toast('Password baru tidak boleh kosong','er'); return; }
  if (n!==c) { toast('Konfirmasi password tidak cocok','er'); return; }
  u.password=n; saveDB(); toast('Password berhasil diubah');
  ['po','pn','pc'].forEach(id=>document.getElementById(id).value='');
}
function saveJamKerja() {
  DB.settings.jamMasuk = document.getElementById('jk-masuk').value || '07:00';
  DB.settings.jamPulang = document.getElementById('jk-pulang').value || '15:00';
  DB.settings.gajiPerJam = +document.getElementById('jk-gaji').value || 0;
  saveDB(); toast('Jam kerja & gaji disimpan');
}
function saveSekolah() {
  DB.settings.namaSekolah = document.getElementById('sk-nm').value;
  DB.settings.npsn = document.getElementById('sk-np').value;
  DB.settings.tahunAjaran = document.getElementById('sk-ta').value;
  DB.settings.alamat = document.getElementById('sk-al').value;
  DB.settings.telp = document.getElementById('sk-tel').value;
  DB.settings.email = document.getElementById('sk-em').value;
  saveDB(); toast('Pengaturan sekolah disimpan');
  document.getElementById('s-school').textContent = DB.settings.namaSekolah || 'EduSmart';
  document.getElementById('login-school-name').textContent = DB.settings.namaSekolah || 'EduSmart';
  applyLogo();
}
function simpanLogoSekolah(input) {
  const file = input.files[0]; if (!file) return;
  if (!file.type.startsWith('image/')) { toast('File harus berupa gambar', 'er'); return; }
  if (file.size > 1024*1024) { toast('Ukuran logo maksimal 1MB', 'er'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    DB.settings.logo = e.target.result;
    saveDB(); applyLogo(); toast('Logo sekolah diperbarui'); pgSettings();
  };
  reader.readAsDataURL(file);
}
function hapusLogoSekolah() {
  confirmAction('Hapus logo sekolah? Halaman login dan sidebar akan kembali memakai ikon default.', () => {
    delete DB.settings.logo;
    saveDB(); applyLogo(); toast('Logo sekolah dihapus'); pgSettings();
  }, 'Ya, Hapus');
}
function applyLogo() {
  const html = DB.settings.logo
    ? `<img src="${DB.settings.logo}" alt="Logo">`
    : `<i class="ti ti-school"></i>`;
  const loginBox = document.getElementById('login-logo-box');
  const sideBox = document.getElementById('s-logo-box');
  if (loginBox) loginBox.innerHTML = html;
  if (sideBox) sideBox.innerHTML = html;
  renderIcons(document);
}
function exportDB() {
  const data = JSON.stringify(DB, null, 2);
  const a = document.createElement('a');
  a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(data);
  a.download = 'edusmart_backup_'+now()+'.json'; a.click();
  toast('Database diunduh');
}
function importDB(input) {
  const file = input.files[0]; if (!file) return;
  confirmAction('Import database akan mengganti semua data saat ini. Lanjutkan?', () => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        DB = JSON.parse(e.target.result); saveDB();
        toast('Database berhasil diimport'); pgSettings();
      } catch(err) { toast('File tidak valid atau rusak', 'er'); }
    };
    reader.readAsText(file);
  }, 'Ya, Lanjutkan');
}
function resetDB() {
  confirmAction('RESET DATABASE?\n\nSEMUA data (siswa, guru, nilai, absensi, dll) akan dihapus permanen.\nHanya akun admin yang akan dipertahankan.\n\nLanjutkan?', () => {
    const adminUser = DB.users.find(u=>u.role==='admin');
    DB = {
      settings: DB.settings || { namaSekolah:'EduSmart', npsn:'', alamat:'', tahunAjaran:'2024/2025', telp:'', email:'', jamMasuk:'07:00', jamPulang:'15:00', gajiPerJam:25000 },
      users: adminUser ? [adminUser] : [{ id:'admin-1', role:'admin', username:'admin', password:'admin123', nama:'Administrator', email:'admin@sekolah.id' }],
      siswa:[], guru:[], kelas:[], mapel:[], tugas:[], pengumpulan:[], nilai:[], absensi:[], keuangan:[], fasilitas:[], surat:[], soal:[],
      absenGuru:[], absensiKelas:[], pengumuman:[], forum:[], tagihanSpp:[], notifPribadi:[], jadwalGuru:[]
    };
    saveDB(); toast('Database direset'); pgSettings();
  }, 'Ya, Reset');
}
function resetDataSiswa() {
  const jumlah = (DB.siswa||[]).length;
  if (!jumlah) { toast('Belum ada data siswa', 'wn'); return; }
  confirmAction(`RESET DATA SISWA?\n\nSeluruh data ${jumlah} siswa (profil, akun login, nilai, absensi, pengumpulan tugas, tagihan SPP) akan dihapus permanen.\nData guru, kelas, mapel, dan lainnya TIDAK terpengaruh.\n\nLanjutkan?`, () => {
    const siswaIds = new Set(DB.siswa.map(s => s.id));
    const userIds = new Set(DB.siswa.filter(s => s.userId).map(s => s.userId));
    DB.users = DB.users.filter(u => !userIds.has(u.id));
    DB.siswa = [];
    DB.nilai = (DB.nilai||[]).filter(n => !siswaIds.has(n.siswaId));
    DB.absensi = (DB.absensi||[]).filter(a => !siswaIds.has(a.siswaId));

    saveDB(); toast('Data siswa berhasil direset'); pgSettings();
  }, 'Ya, Reset Data Siswa');
}

function renderNotifBell() {
  const dot = document.getElementById('notif-dot');
  if (!dot) return;
  const u = DB.users.find(x=>x.id===S.uid);
  const seen = (u && u.notifSeenCount) || 0;
  const unreadPengumuman = Math.max(0, (DB.pengumuman||[]).length - seen);
  const unreadPribadi = (DB.notifPribadi||[]).filter(n=>n.userId===S.uid && !n.dibaca).length;
  const unread = unreadPengumuman + unreadPribadi;
  if (unread > 0) { dot.style.display = 'flex'; dot.textContent = unread > 9 ? '9+' : unread; }
  else { dot.style.display = 'none'; dot.textContent = '0'; }
}
function toggleNotifPanel(e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const willOpen = !panel.classList.contains('on');
  document.querySelectorAll('.notif-panel.on').forEach(p=>p.classList.remove('on'));
  if (willOpen) {
    panel.classList.add('on');
    const list = document.getElementById('notif-list');
    // Notifikasi pribadi (mis. Tagihan SPP) ditampilkan terlebih dahulu, lalu pengumuman umum sekolah
    const pribadiItems = (DB.notifPribadi||[]).filter(n=>n.userId===S.uid).slice().reverse().map(n=>({
      judul: n.judul, isi: n.isi||'', tgl: n.tgl||'', pribadi: true,
      icon: n.jenis==='spp' ? 'ti-receipt' : 'ti-bell'
    }));
    const pengumumanItems = [...(DB.pengumuman||[])].reverse().map(p=>({ judul: p.judul, isi: p.isi||'', tgl: p.tgl||'', pribadi: false, page: 'pengumuman' }));
    const items = [...pribadiItems, ...pengumumanItems].slice(0, 15);
    list.innerHTML = items.length
      ? items.map(it=>`<div class="notif-item" ${it.page?`onclick="closeNotifAndGoTo('${it.page}')"`:`onclick="document.getElementById('notif-panel').classList.remove('on')"`}>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
            ${it.pribadi ? `<i class="ti ${it.icon}" style="color:var(--p);font-size:14px"></i>` : ''}
            <div style="font-weight:700;font-size:13px">${esc(it.judul)}</div>
          </div>
          <div style="font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(it.isi||'')}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:4px"><i class="ti ti-clock"></i> ${esc(it.tgl||'')}</div>
        </div>`).join('')
      : `<div style="padding:24px 14px;text-align:center;color:var(--tx3);font-size:13px"><i class="ti ti-bell-off" style="font-size:22px;display:block;margin-bottom:6px"></i>Belum ada notifikasi</div>`;
    renderIcons(list);
    // Tandai semua sudah dibaca begitu panel dibuka
    const u = DB.users.find(x=>x.id===S.uid);
    if (u) { u.notifSeenCount = (DB.pengumuman||[]).length; }
    (DB.notifPribadi||[]).forEach(n=>{ if (n.userId===S.uid) n.dibaca = true; });
    saveDB();
    renderNotifBell();
  } else {
    panel.classList.remove('on');
  }
}
function closeNotifAndGoTo(page) {
  document.getElementById('notif-panel')?.classList.remove('on');
  goTo(page, null);

let _scanner = null;
function pgScanKelas() {

        </div>

      </div>

  </div>`);
}
function renderRiwayatMengajarGuru(guruId) {
  const list = DB.absensiKelas.filter(a=>a.guruId===guruId && a.tanggal===now()).slice().reverse();
  if (!list.length) return blank('Belum ada riwayat','Scan barcode kelas untuk mulai mencatat','ti-scan');
  return `<div class="tw"><table><thead><tr><th>Kelas</th><th>Masuk</th><th>Keluar</th></tr></thead><tbody>
    ${list.map(a=>{
      const k = DB.kelas.find(x=>x.id===a.kelasId)||{};
      return `<tr><td><b>${esc(k.nama||'-')}</b></td><td>${esc(a.jamMasuk)}</td><td>${esc(a.jamKeluar||'—')}</td></tr>`;
    }).join('')}
  </tbody></table></div>`;
}
let _scanStarting = false;
function mulaiScan() {
  if (typeof Html5Qrcode === 'undefined') { toast('Pustaka pemindai tidak dapat dimuat (perlu koneksi internet)','er'); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast('Perangkat/browser ini tidak mendukung akses kamera. Gunakan input kode manual di bawah.', 'er'); return;
  }
  if (_scanStarting) return; // cegah klik dobel saat kamera masih proses aktivasi
  const box = document.getElementById('scan-box');
  if (!box) return;
  // Jika ada sesi scanner sebelumnya yang masih berjalan (mis. dari halaman lain), matikan dulu
  // supaya tidak terjadi konflik "kamera sedang digunakan" saat mengaktifkan ulang.
  const startFresh = () => {
    _scanStarting = true;
    box.innerHTML = ''; box.style.padding = '0';
    box.style.cssText += ';min-height:220px;display:block';
    const elId = 'html5qr-' + uid();
    const div = document.createElement('div'); div.id = elId; div.style.width = '100%';
    box.appendChild(div);
    _scanner = new Html5Qrcode(elId);
    _scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: 200 },
      (decodedText) => { prosesScanKode(decodedText); hentikanScan(); },
      () => {}
    ).then(() => { _scanStarting = false; }).catch((err) => {
      _scanStarting = false;
      _scanner = null;
      let msg = 'Tidak dapat mengakses kamera.';
      const name = (err && err.name) || '';
      if (name === 'NotAllowedError' || /permission/i.test(String(err))) msg = 'Akses kamera ditolak. Izinkan akses kamera pada browser untuk perangkat ini, lalu coba lagi.';
      else if (name === 'NotFoundError') msg = 'Kamera tidak ditemukan pada perangkat ini. Gunakan input kode manual di bawah.';
      else if (name === 'NotReadableError') msg = 'Kamera sedang dipakai aplikasi lain. Tutup aplikasi/tab lain yang memakai kamera lalu coba lagi.';
      toast(msg, 'er');
      box.style.padding = '';
      box.style.display = 'flex'; box.style.alignItems = 'center'; box.style.justifyContent = 'center';
      box.innerHTML = msg;
    });
  };
  if (_scanner) {
    _scanner.stop().then(()=>_scanner.clear()).catch(()=>{}).finally(() => { _scanner = null; startFresh(); });
  } else {
    startFresh();
  }
}
function hentikanScan() {
  _scanStarting = false;
  if (_scanner) {
    const s = _scanner; _scanner = null;
    s.stop().then(()=>s.clear()).catch(()=>{});
  }
  const box = document.getElementById('scan-box');
  if (box) {
    box.style.padding = '';
    box.style.display = 'flex'; box.style.alignItems = 'center'; box.style.justifyContent = 'center'; box.style.color = '#888'; box.style.fontSize = '12px';
    box.innerHTML = 'Kamera belum aktif';
  }
}
function prosesScanKode(kode) {
  kode = (kode||'').trim();
  if (!kode) { toast('Kode barcode kosong','er'); return; }
  const k = DB.kelas.find(x=>x.barcode===kode);
  if (!k) { toast('Barcode kelas tidak dikenali','er'); return; }
  const g = DB.guru.find(x=>x.userId===S.uid);
  if (!g) { toast('Akun guru tidak ditemukan','er'); return; }
  const sesiAktif = DB.absensiKelas.find(a=>a.guruId===g.id && a.kelasId===k.id && a.tanggal===now() && !a.jamKeluar);
  if (sesiAktif) {
    sesiAktif.jamKeluar = nowTime();
    saveDB(); toast('Sesi mengajar di kelas ' + k.nama + ' diakhiri');
  } else {
    const lainAktif = DB.absensiKelas.find(a=>a.guruId===g.id && a.tanggal===now() && !a.jamKeluar);
    if (lainAktif) { lainAktif.jamKeluar = nowTime(); }
    DB.absensiKelas.push({ id: uid(), guruId: g.id, kelasId: k.id, tanggal: now(), jamMasuk: nowTime(), jamKeluar: null });
    saveDB(); toast('Mulai mengajar di kelas ' + k.nama);
  }
  pgScanKelas();
}

function pgAbsenGuruAdmin() {
  const bulanIni = now().slice(0,7);
  pg(`

function renderAbsenGuruAdmin() {
  const bulan = document.getElementById('agu-bulan')?.value || now().slice(0,7);
  const cont = document.getElementById('agu-content'); if (!cont) return;
  const rows = DB.guru.map(g => {
    const absen = DB.absenGuru.filter(a=>a.guruUserId===g.userId && a.tanggal.startsWith(bulan));
    const hadir = absen.length;
    const jamKerjaMs = absen.reduce((tot,a)=>{
      if (!a.jamDatang || !a.jamPulang) return tot;
      const [h1,m1] = a.jamDatang.split(':').map(Number); const [h2,m2] = a.jamPulang.split(':').map(Number);
      return tot + Math.max(0,(h2*60+m2)-(h1*60+m1));
    },0);
    const jamMengajar = DB.absensiKelas.filter(a=>a.guruId===g.id && a.tanggal.startsWith(bulan) && a.jamKeluar).reduce((tot,a)=>{
      const [h1,m1] = a.jamMasuk.split(':').map(Number); const [h2,m2] = a.jamKeluar.split(':').map(Number);
      return tot + Math.max(0,(h2*60+m2)-(h1*60+m1));
    },0)/60;
    const tarif = g.gajiPerJam!=null ? g.gajiPerJam : (DB.settings.gajiPerJam||0);
    const gaji = Math.round(jamMengajar * tarif);
    return { g, hadir, jamKerja: (jamKerjaMs/60).toFixed(1), jamMengajar: jamMengajar.toFixed(1), gaji };
  });
  const totalGaji = rows.reduce((a,b)=>a+b.gaji,0);
  cont.innerHTML = `
  <div class="sg sg-3">
    ${sc('Total Guru', DB.guru.length, 'ti-chalkboard', '#F0FDF4', '#16A34A', 'guru terdaftar')}
    ${sc('Bulan Dipilih', bulan, 'ti-calendar', '#EFF6FF', '#2563EB', 'periode laporan')}
    ${sc('Total Gaji', rp(totalGaji), 'ti-cash', '#F5F3FF', '#7C3AED', 'estimasi periode ini')}
  </div>
  <div class="card"><div class="cb" style="padding:0">
    ${rows.length
      ? `<div class="tw"><table><thead><tr><th>Guru</th><th>Hari Hadir</th><th>Jam Kerja</th><th>Jam Mengajar</th><th>Estimasi Gaji</th></tr></thead><tbody>
          ${rows.map(r=>`<tr>
            <td><b>${esc(r.g.nama)}</b></td>
            <td>${r.hadir} hari</td>
            <td>${r.jamKerja} jam</td>
            <td>${r.jamMengajar} jam</td>
            <td><b>${rp(r.gaji)}</b></td>
          </tr>`).join('')}
        </tbody></table></div>`
      : blank('Belum ada guru','Tambah akun guru terlebih dahulu','ti-chalkboard')}
  </div></div>`;
  renderIcons(cont);
}

    ${sc('Total Siswa/i', DB.siswa.length, 'ti-users', '#EFF6FF', '#2563EB', DB.kelas.length+' kelas')}
    ${sc('Laki-laki', totalL, 'ti-gender-male', '#F0FDF4', '#16A34A', totalL+' siswa')}
    ${sc('Perempuan', totalP, 'ti-gender-female', '#FEF2F2', '#DC2626', totalP+' siswi')}
  </div>
  <div class="card"><div class="cb" style="padding:0">
    ${perKelas.length
      ? `<div class="tw"><table><thead><tr><th>Kelas</th><th>Laki-laki</th><th>Perempuan</th><th>Total</th></tr></thead><tbody>
          ${perKelas.map(k=>`<tr><td><b>${esc(k.nama)}</b></td><td>${k.l}</td><td>${k.p}</td><td><b>${k.total}</b></td></tr>`).join('')}
        </tbody></table></div>`
      : blank('Belum ada kelas','Tambah kelas & siswa terlebih dahulu','ti-users')}
  </div></div>`);
}

// ============================================================
// FORUM DISKUSI (Semua Role)
// ============================================================
function pgForum() {
  pg(`
  <div class="card" style="margin-bottom:16px">
    <div class="cb">
      <div class="fg" style="margin-bottom:8px"><textarea id="forum-msg" placeholder="Tulis sesuatu untuk forum diskusi sekolah..." style="min-height:60px"></textarea></div>
      <div style="display:flex;justify-content:flex-end"><button class="bp bsm" onclick="kirimForum()"><i class="ti ti-send"></i> Kirim</button></div>
    </div>
  </div>
  <div id="forum-list"></div>`);
  renderForumList();
}
function renderForumList() {
  const cont = document.getElementById('forum-list'); if (!cont) return;
  const list = [...DB.forum].reverse();
  cont.innerHTML = list.length
    ? list.map(f=>`<div class="card" style="margin-bottom:10px"><div class="cb">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="display:flex;gap:10px;align-items:center">
            <div class="av av-sm" style="background:${{admin:'#DC2626',guru:'#7C3AED',siswa:'#2563EB',kepsek:'#0891B2'}[f.role]||'#64748B'}">${esc((f.nama||'U')[0])}</div>
            <div>
              <div style="font-weight:700;font-size:13px">${esc(f.nama)} <span class="bdg dbl" style="margin-left:4px">${esc(f.role)}</span></div>
              <div style="font-size:11px;color:var(--tx3)">${esc(f.tgl)} ${esc(f.waktu||'')}</div>
            </div>
          </div>
          ${(S.role==='admin' || f.uid===S.uid) ? `<button class="bo bsm" onclick="hapusForum('${f.id}')"><i class="ti ti-trash"></i></button>` : ''}
        </div>
        <p style="font-size:13px;color:var(--tx2);margin-top:10px;white-space:pre-wrap">${esc(f.pesan)}</p>
      </div></div>`).join('')
    : `<div class="card"><div class="cb">${blank('Belum ada diskusi','Jadilah yang pertama memulai diskusi','ti-message-2')}</div></div>`;
  renderIcons(cont);
}
function kirimForum() {
  const el = document.getElementById('forum-msg');
  const pesan = (el.value||'').trim();
  if (!pesan) { toast('Pesan tidak boleh kosong','er'); return; }
  const u = DB.users.find(x=>x.id===S.uid) || {};
  DB.forum.push({ id: uid(), uid: S.uid, nama: u.nama||'User', role: S.role, pesan, tgl: now(), waktu: nowTime() });
  saveDB(); el.value=''; toast('Pesan terkirim'); renderForumList();
}
function hapusForum(id) {
  confirmAction('Hapus pesan ini?', () => {
    DB.forum = DB.forum.filter(f=>f.id!==id); saveDB(); toast('Pesan dihapus'); renderForumList();
  });
}

// ============================================================
// PENGUMUMAN
// ============================================================
function pgPengumuman() {
  const bolehTulis = S.role==='admin' || S.role==='kepsek';
  pg(`
  ${bolehTulis ? `<div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="bp bsm" onclick="mdlTambahPengumuman()"><i class="ti ti-plus"></i> Buat Pengumuman</button>
  </div>` : ''}
  <div id="pengumuman-list"></div>`);
  renderPengumumanList();
}
function renderPengumumanList() {
  const cont = document.getElementById('pengumuman-list'); if (!cont) return;
  const bolehTulis = S.role==='admin' || S.role==='kepsek';
  const list = [...DB.pengumuman].reverse();
  cont.innerHTML = list.length
    ? list.map(p=>`<div class="card" style="margin-bottom:10px"><div class="cb">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <h3 style="font-size:15px;font-weight:700;margin-bottom:4px">${esc(p.judul)}</h3>
            <p style="font-size:11px;color:var(--tx3)"><i class="ti ti-clock"></i> ${esc(p.tgl)} &middot; oleh ${esc(p.oleh||'-')}</p>
          </div>
          ${bolehTulis ? `<div style="display:flex;gap:4px;flex-shrink:0">
            <button class="bo bsm" onclick="mdlEditPengumuman('${p.id}')"><i class="ti ti-edit"></i></button>
            <button class="br bsm" onclick="hapusPengumuman('${p.id}')"><i class="ti ti-trash"></i></button>
          </div>` : ''}
        </div>
        <p style="font-size:13px;color:var(--tx2);margin-top:10px;white-space:pre-wrap">${esc(p.isi)}</p>
      </div></div>`).join('')
    : `<div class="card"><div class="cb">${blank('Belum ada pengumuman','Pengumuman sekolah akan tampil di sini','ti-speakerphone')}</div></div>`;
  renderIcons(cont);
}
function mdlTambahPengumuman() {
  openMdl('Buat Pengumuman', `
  <div class="fg"><label>Judul *</label><input id="pgm-judul" placeholder="Judul pengumuman..."></div>
  <div class="fg"><label>Isi *</label><textarea id="pgm-isi" placeholder="Isi pengumuman..."></textarea></div>`,
  `<button class="bo" onclick="closeMdl()">Batal</button>
   <button class="bp" onclick="savePengumuman()"><i class="ti ti-check"></i> Terbitkan</button>`);
}
function savePengumuman() {
  const judul = (document.getElementById('pgm-judul').value||'').trim();
  const isi = (document.getElementById('pgm-isi').value||'').trim();
  if (!judul || !isi) { toast('Judul dan isi wajib diisi','er'); return; }
  const u = DB.users.find(x=>x.id===S.uid) || {};
  DB.pengumuman.push({ id: uid(), judul, isi, tgl: now(), oleh: u.nama||'-' });
  saveDB(); closeMdl(); toast('Pengumuman diterbitkan'); renderPengumumanList(); renderNotifBell();
}
function mdlEditPengumuman(id) {
  const p = DB.pengumuman.find(x=>x.id===id); if (!p) return;
  openMdl('Edit Pengumuman', `
  <div class="fg"><label>Judul *</label><input id="pgm-judul" value="${esc(p.judul)}"></div>
  <div class="fg"><label>Isi *</label><textarea id="pgm-isi">${esc(p.isi)}</textarea></div>`,
  `<button class="br" style="margin-right:auto" onclick="hapusPengumuman('${id}')"><i class="ti ti-trash"></i></button>
   <button class="bo" onclick="closeMdl()">Batal</button>
   <button class="bp" onclick="updatePengumuman('${id}')"><i class="ti ti-check"></i> Simpan</button>`);
}
function updatePengumuman(id) {
  const p = DB.pengumuman.find(x=>x.id===id); if (!p) return;
  const judul = (document.getElementById('pgm-judul').value||'').trim();
  const isi = (document.getElementById('pgm-isi').value||'').trim();
  if (!judul || !isi) { toast('Judul dan isi wajib diisi','er'); return; }
  p.judul = judul; p.isi = isi;
  saveDB(); closeMdl(); toast('Pengumuman diperbarui'); renderPengumumanList();
}
function hapusPengumuman(id) {
  confirmAction('Hapus pengumuman ini?', () => {
    DB.pengumuman = DB.pengumuman.filter(p=>p.id!==id); saveDB(); toast('Pengumuman dihapus'); renderPengumumanList(); renderNotifBell();
  });
}

// ============================================================
// INIT
// ============================================================
initDB();
// Update login school name & logo on startup
document.getElementById('login-school-name').textContent = DB.settings.namaSekolah || 'EduSmart';
applyLogo();
renderIcons(document);
</script>
</body>
